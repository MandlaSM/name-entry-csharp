trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '8.0.x'
  displayName: 'Install .NET SDK'

- script: dotnet restore NameEntryApp.csproj
  displayName: 'Restore packages'

- script: dotnet build NameEntryApp.csproj --configuration Release
  displayName: 'Build application'

- script: dotnet publish NameEntryApp.csproj --configuration Release --output $(Build.ArtifactStagingDirectory)
  displayName: 'Publish application'

- task: PublishPipelineArtifact@1
  inputs:
    targetPath: '$(Build.ArtifactStagingDirectory)'
    artifact: 'name-entry-site'
    publishLocation: 'pipeline'
  displayName: 'Publish build artifact'